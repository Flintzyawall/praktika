<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Школьный Опросник | Аналитика и графики</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- CSS Переменные для легкой настройки --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --primary-light: rgba(59, 130, 246, 0.15);
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 8px;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1rem;
            line-height: 1.6;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- Шапка --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--card-bg);
            padding: 1.5rem 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            backdrop-filter: blur(10px);
        }

        .header-title h1 { font-size: 1.75rem; font-weight: 800; color: var(--text-main); }
        .header-title i { color: var(--primary); margin-right: 0.5rem; }
        .header-title p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem; }

        .badge {
            background: var(--primary-light);
            color: var(--primary);
            padding: 0.75rem 1.25rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* --- Основная сетка --- */
        main {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
            align-items: start;
        }

        .panel {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-main);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 1rem;
        }

        /* --- Формы и инпуты --- */
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-main); font-size: 0.95rem; }
        
        input {
            width: 100%;
            padding: 0.875rem 1.25rem;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: var(--transition);
            background: white;
            color: var(--text-main);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .option-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; animation: fadeIn 0.3s ease; }
        
        /* --- Кнопки --- */
        .btn {
            border: none;
            border-radius: var(--radius-md);
            padding: 0.875rem 1.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 15px var(--primary-light); }
        
        .btn-secondary { background: #f1f5f9; color: var(--text-main); width: auto; padding: 0.6rem 1.2rem; font-size: 0.9rem; }
        .btn-secondary:hover { background: var(--border-color); }
        
        .btn-icon { background: #f1f5f9; color: var(--danger); width: 46px; border-radius: var(--radius-md); font-size: 1.2rem; }
        .btn-icon:hover { background: #fee2e2; transform: scale(1.05); }

        /* --- Списки опросов --- */
        .surveys-list { display: flex; flex-direction: column; gap: 1rem; max-height: 300px; overflow-y: auto; padding-right: 0.5rem; }
        .surveys-list::-webkit-scrollbar { width: 6px; }
        .surveys-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .survey-card {
            padding: 1.25rem;
            border-radius: var(--radius-md);
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        .survey-card:hover { border-color: var(--primary); transform: translateX(5px); }
        .survey-card.active { border-color: var(--primary); background: var(--primary-light); }
        
        .survey-card-info h4 { font-size: 1.05rem; margin-bottom: 0.25rem; }
        .survey-card-info p { font-size: 0.8rem; color: var(--text-muted); }
        
        .btn-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.5rem; transition: var(--transition); font-size: 1.1rem; }
        .btn-delete:hover { color: var(--danger); }

        /* --- Зона голосования --- */
        .voting-area {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px solid var(--border-color);
            animation: fadeIn 0.5s ease;
        }

        .vote-option {
            position: relative;
            margin-bottom: 1rem;
            border-radius: var(--radius-md);
            background: white;
            border: 2px solid var(--border-color);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0;
            transition: var(--transition);
        }

        .vote-option:hover { border-color: var(--primary); }

        .vote-progress {
            position: absolute;
            top: 0; left: 0; height: 100%;
            background: var(--primary-light);
            z-index: 1;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .vote-content {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 1rem 1.5rem;
        }

        .vote-text { font-weight: 600; font-size: 1rem; }
        .vote-stats { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }
        
        .btn-vote {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            z-index: 3;
            transition: var(--transition);
        }
        .btn-vote:hover { background: var(--primary-hover); transform: scale(1.05); }

        /* --- График --- */
        .chart-wrapper { 
            margin-top: 2rem; 
            padding: 1rem; 
            background: white; 
            border-radius: var(--radius-md); 
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .chart-type-buttons {
            display: flex;
            gap: 0.5rem;
        }
        
        .chart-type-btn {
            background: #f1f5f9;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-muted);
        }
        
        .chart-type-btn.active {
            background: var(--primary);
            color: white;
        }
        
        .chart-type-btn:hover:not(.active) {
            background: #e2e8f0;
        }

        /* --- Утилиты --- */
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Toast Уведомления --- */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: #1e293b; color: white; padding: 1rem 1.5rem; border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 0.75rem;
            animation: slideIn 0.3s ease forwards; font-weight: 500;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

        /* Адаптив */
        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            .header-title h1 { font-size: 1.4rem; }
            .badge { font-size: 0.8rem; padding: 0.5rem 1rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="header-title">
            <h1><i class="fas fa-chart-pie"></i> Интерактивный Опросник</h1>
            <p>Создавайте опросы, голосуйте и анализируйте результаты в реальном времени</p>
        </div>
        <div class="badge">
            <i class="fas fa-graduation-cap"></i> ИТ-Практика
        </div>
    </header>

    <main>
        <aside class="panel">
            <div class="panel-title"><i class="fas fa-pen-to-square"></i> Создать опрос</div>
            
            <div class="form-group">
                <label>Тема или вопрос</label>
                <input type="text" id="questionInput" placeholder="Например: Какой язык программирования лучше?">
            </div>

            <div class="form-group">
                <label>Варианты ответов</label>
                <div id="optionsWrapper"></div>
                <button type="button" class="btn btn-secondary" id="btnAddOption" style="margin-top: 1rem;">
                    <i class="fas fa-plus"></i> Добавить вариант
                </button>
            </div>

            <button class="btn btn-primary" id="btnCreateSurvey">
                <i class="fas fa-paper-plane"></i> Запустить опрос
            </button>

            <div style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                <button class="btn" style="background: #fee2e2; color: var(--danger);" id="btnResetData">
                    <i class="fas fa-rotate-right"></i> Сбросить данные
                </button>
            </div>
        </aside>

        <section class="panel">
            <div class="panel-title"><i class="fas fa-list-check"></i> Актуальные опросы</div>
            
            <div id="surveysList" class="surveys-list">
                </div>

            <div id="surveyDetails">
                <div class="empty-state">
                    <i class="fas fa-hand-pointer"></i>
                    <h3>Выберите опрос</h3>
                    <p>Кликните на опрос из списка выше, чтобы увидеть статистику и проголосовать.</p>
                </div>
            </div>
        </section>
    </main>
</div>

<div id="toast-container"></div>

<script>
    const STORAGE_KEY = "modern_school_surveys";
    let surveys = [];
    let currentChart = null;
    let selectedSurveyId = null;
    let newOptions = ["", ""];
    let currentChartType = 'bar'; // 'bar' or 'pie'

    // --- Система уведомлений (Toasts) ---
    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icon = type === 'success' ? '<i class="fas fa-check-circle" style="color:#4ade80;"></i>' : '<i class="fas fa-exclamation-circle" style="color:#f87171;"></i>';
        toast.innerHTML = `${icon} <span>${message}</span>`;
        container.appendChild(toast);
        
        setTimeout(() => {
            toast.style.animation = 'slideOut 0.3s ease forwards';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // --- 5 готовых пустых опросов (без результатов, все голоса = 0) ---
    function getPredefinedEmptySurveys() {
        return [
            { 
                id: 101, 
                question: "Какой школьный предмет вам нравится больше всего?", 
                options: ["Математика", "Русский язык", "Физика", "Информатика", "История"], 
                votes: [0, 0, 0, 0, 0] 
            },
            { 
                id: 102, 
                question: "Как вы предпочитаете проводить перемену?", 
                options: ["Общаться с друзьями", "Играть в настольные игры", "Готовиться к следующему уроку", "Отдыхать в тишине"], 
                votes: [0, 0, 0, 0] 
            },
            { 
                id: 103, 
                question: "Какой формат домашнего задания кажется самым полезным?", 
                options: ["Творческие проекты", "Практические задачи", "Тесты онлайн", "Письменные упражнения"], 
                votes: [0, 0, 0, 0] 
            },
            { 
                id: 104, 
                question: "Что важно для комфортной учебы в школе?", 
                options: ["Современное оборудование", "Дружный класс", "Интересные уроки", "Поддержка учителя"], 
                votes: [0, 0, 0, 0] 
            },
            { 
                id: 105, 
                question: "Какой вид внеклассной активности вам ближе?", 
                options: ["Спортивные секции", "Творческие кружки", "Волонтерство", "Научные клубы"], 
                votes: [0, 0, 0, 0] 
            }
        ];
    }

    function loadData() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) {
            try { 
                const parsed = JSON.parse(data);
                if (parsed && parsed.length > 0) {
                    surveys = parsed;
                } else {
                    surveys = getPredefinedEmptySurveys();
                }
                return;
            } catch(e) {}
        }
        surveys = getPredefinedEmptySurveys();
        saveData();
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(surveys));
    }

    // --- Логика создания опроса ---
    function renderOptionInputs() {
        const wrapper = document.getElementById('optionsWrapper');
        wrapper.innerHTML = newOptions.map((opt, index) => `
            <div class="option-row">
                <input type="text" class="new-opt-input" value="${escapeHtml(opt)}" placeholder="Вариант ${index + 1}" data-index="${index}">
                <button type="button" class="btn btn-icon btn-remove-opt" data-index="${index}"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');

        document.querySelectorAll('.new-opt-input').forEach(input => {
            input.addEventListener('input', (e) => {
                newOptions[e.target.dataset.index] = e.target.value;
            });
        });

        document.querySelectorAll('.btn-remove-opt').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (newOptions.length <= 2) {
                    showToast("Минимум 2 варианта ответа!", "error");
                    return;
                }
                newOptions.splice(e.currentTarget.dataset.index, 1);
                renderOptionInputs();
            });
        });
    }

    document.getElementById('btnAddOption').addEventListener('click', () => {
        newOptions.push("");
        renderOptionInputs();
    });

    document.getElementById('btnCreateSurvey').addEventListener('click', () => {
        const question = document.getElementById('questionInput').value.trim();
        if (!question) return showToast("Введите вопрос!", "error");

        const filteredOptions = newOptions.map(o => o.trim()).filter(o => o !== "");
        if (filteredOptions.length < 2) return showToast("Заполните минимум 2 варианта!", "error");

        const newSurvey = {
            id: Date.now(),
            question: question,
            options: filteredOptions,
            votes: new Array(filteredOptions.length).fill(0)
        };

        surveys.unshift(newSurvey);
        saveData();
        
        document.getElementById('questionInput').value = "";
        newOptions = ["", ""];
        renderOptionInputs();
        
        showToast("Опрос успешно создан!");
        renderSurveysList();
        selectSurvey(newSurvey.id);
    });

    // --- Отображение списков и деталей ---
    function renderSurveysList() {
        const list = document.getElementById('surveysList');
        if (!surveys.length) {
            list.innerHTML = `<div class="empty-state"><p>Нет активных опросов</p></div>`;
            return;
        }

        list.innerHTML = surveys.map(survey => {
            const total = survey.votes.reduce((a, b) => a + b, 0);
            return `
                <div class="survey-card ${selectedSurveyId === survey.id ? 'active' : ''}" data-id="${survey.id}">
                    <div class="survey-card-info">
                        <h4>${escapeHtml(survey.question)}</h4>
                        <p><i class="fas fa-users"></i> Голосов: ${total}</p>
                    </div>
                    <button class="btn-delete" data-id="${survey.id}" title="Удалить"><i class="fas fa-times"></i></button>
                </div>
            `;
        }).join('');

        document.querySelectorAll('.survey-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (!e.target.closest('.btn-delete')) selectSurvey(Number(card.dataset.id));
            });
        });

        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if(confirm("Удалить этот опрос?")) {
                    surveys = surveys.filter(s => s.id !== Number(btn.dataset.id));
                    if (selectedSurveyId === Number(btn.dataset.id)) selectedSurveyId = null;
                    saveData();
                    renderSurveysList();
                    if (!selectedSurveyId || surveys.length === 0) {
                        document.getElementById('surveyDetails').innerHTML = `<div class="empty-state">
                            <i class="fas fa-hand-pointer"></i>
                            <h3>Выберите опрос</h3>
                            <p>Кликните на опрос из списка выше, чтобы увидеть статистику и проголосовать.</p>
                        </div>`;
                    } else if (selectedSurveyId && surveys.find(s => s.id === selectedSurveyId)) {
                        renderSurveyDetails();
                    }
                    showToast("Опрос удален");
                }
            });
        });
    }

    function selectSurvey(id) {
        selectedSurveyId = id;
        renderSurveysList();
        renderSurveyDetails();
    }

    function renderSurveyDetails() {
        const container = document.getElementById('surveyDetails');
        const survey = surveys.find(s => s.id === selectedSurveyId);
        
        if (!survey) {
            container.innerHTML = `<div class="empty-state">
                <i class="fas fa-hand-pointer"></i>
                <h3>Выберите опрос</h3>
                <p>Кликните на опрос из списка выше, чтобы увидеть статистику и проголосовать.</p>
            </div>`;
            return;
        }

        const totalVotes = survey.votes.reduce((a, b) => a + b, 0);

        let html = `<div class="voting-area">
            <h3 style="margin-bottom: 1rem; color: var(--text-main);"><i class="fas fa-poll-h"></i> ${escapeHtml(survey.question)}</h3>
            <div class="options-container">`;

        survey.options.forEach((opt, index) => {
            const votes = survey.votes[index];
            const percent = totalVotes === 0 ? 0 : Math.round((votes / totalVotes) * 100);
            
            html += `
                <div class="vote-option">
                    <div class="vote-progress" style="width: ${percent}%"></div>
                    <div class="vote-content">
                        <div style="display: flex; flex-direction: column; gap: 4px; z-index: 2;">
                            <span class="vote-text">${escapeHtml(opt)}</span>
                            <span class="vote-stats">${votes} голосов (${percent}%)</span>
                        </div>
                        <button class="btn-vote" onclick="castVote(${survey.id}, ${index})">Голосовать</button>
                    </div>
                </div>
            `;
        });

        html += `</div>
            <div class="chart-wrapper">
                <div class="chart-header">
                    <span style="font-weight: 600;"><i class="fas fa-chart-simple"></i> Визуализация результатов</span>
                    <div class="chart-type-buttons">
                        <button class="chart-type-btn ${currentChartType === 'bar' ? 'active' : ''}" data-type="bar"><i class="fas fa-chart-bar"></i> Столбцы</button>
                        <button class="chart-type-btn ${currentChartType === 'pie' ? 'active' : ''}" data-type="pie"><i class="fas fa-chart-pie"></i> Круговая</button>
                    </div>
                </div>
                <canvas id="chartCanvas"></canvas>
            </div>
        </div>`;

        container.innerHTML = html;
        
        // Добавляем обработчики для переключения типа графика
        document.querySelectorAll('.chart-type-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const type = btn.dataset.type;
                currentChartType = type;
                renderChart(survey);
                // Обновляем активный класс кнопок
                document.querySelectorAll('.chart-type-btn').forEach(b => {
                    b.classList.remove('active');
                });
                btn.classList.add('active');
            });
        });
        
        renderChart(survey);
    }

    function castVote(surveyId, optionIndex) {
        const survey = surveys.find(s => s.id === surveyId);
        if(survey) {
            survey.votes[optionIndex]++;
            saveData();
            renderSurveyDetails();
            renderSurveysList();
            showToast(`Голос учтён за вариант: ${survey.options[optionIndex]}`, "success");
        }
    }

    // --- Отрисовка Графика с поддержкой разных типов ---
    function renderChart(survey) {
        const canvas = document.getElementById('chartCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (currentChart) currentChart.destroy();

        const labels = survey.options.map(o => o.length > 20 ? o.substring(0, 20) + '...' : o);
        const data = survey.votes;
        const totalVotes = data.reduce((a, b) => a + b, 0);

        // Набор ярких цветов для круговой диаграммы
        const colors = [
            '#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', 
            '#ec4899', '#06b6d4', '#84cc16', '#f97316', '#6366f1'
        ];

        if (currentChartType === 'bar') {
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, '#3b82f6');
            gradient.addColorStop(1, '#60a5fa');
            
            currentChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Голоса',
                        data: data,
                        backgroundColor: gradient,
                        borderRadius: 8,
                        borderSkipped: false,
                        barPercentage: 0.6,
                        categoryPercentage: 0.8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    animation: { duration: 800, easing: 'easeOutQuart' },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            padding: 12,
                            titleFont: { size: 14 },
                            bodyFont: { size: 14, weight: 'bold' },
                            displayColors: false,
                            callbacks: { 
                                label: (ctx) => {
                                    const val = ctx.raw;
                                    const percent = totalVotes === 0 ? 0 : ((val / totalVotes) * 100).toFixed(1);
                                    return `${val} голосов (${percent}%)`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            ticks: { precision: 0, stepSize: Math.max(1, Math.ceil(Math.max(...data, 1) / 5)) },
                            title: { display: true, text: 'Количество голосов', font: { size: 12 } }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { maxRotation: 45, minRotation: 45, font: { size: 11 } }
                        }
                    }
                }
            });
        } 
        else if (currentChartType === 'pie') {
            // Для круговой диаграммы используем цвета для каждого сегмента
            const backgroundColors = survey.options.map((_, idx) => colors[idx % colors.length]);
            
            currentChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: backgroundColors,
                        borderWidth: 2,
                        borderColor: 'white',
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    animation: { duration: 800, easing: 'easeOutQuart' },
                    plugins: {
                        legend: { 
                            position: 'bottom',
                            labels: { font: { size: 11 }, boxWidth: 12, padding: 8 }
                        },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            padding: 12,
                            titleFont: { size: 14 },
                            bodyFont: { size: 13 },
                            callbacks: { 
                                label: (ctx) => {
                                    const label = ctx.label || '';
                                    const val = ctx.raw;
                                    const percent = totalVotes === 0 ? 0 : ((val / totalVotes) * 100).toFixed(1);
                                    return `${label}: ${val} голосов (${percent}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }
    }

    // --- Утилиты ---
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    document.getElementById('btnResetData').addEventListener('click', () => {
        if(confirm("Сбросить все опросы и вернуть 5 предустановленных пустых опросов? Все ваши созданные опросы удалятся, а голоса обнулятся.")) {
            surveys = getPredefinedEmptySurveys();
            saveData();
            selectedSurveyId = surveys[0]?.id || null;
            currentChartType = 'bar';
            renderSurveysList();
            if (selectedSurveyId) {
                renderSurveyDetails();
            } else {
                document.getElementById('surveyDetails').innerHTML = `<div class="empty-state">
                    <i class="fas fa-hand-pointer"></i>
                    <h3>Выберите опрос</h3>
                    <p>Кликните на опрос из списка выше, чтобы увидеть статистику и проголосовать.</p>
                </div>`;
            }
            showToast("Данные сброшены к 5 пустым опросам");
        }
    });

    // Запуск приложения
    loadData();
    renderOptionInputs();
    renderSurveysList();
    if(surveys.length) {
        selectedSurveyId = surveys[0].id;
        renderSurveysList();
        renderSurveyDetails();
    } else {
        document.getElementById('surveyDetails').innerHTML = `<div class="empty-state">
            <i class="fas fa-hand-pointer"></i>
            <h3>Нет опросов</h3>
            <p>Создайте опрос или нажмите «Сбросить данные».</p>
        </div>`;
    }

    window.castVote = castVote;
</script>
</body>
</html>
